name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - platform: Win32
            artifact_path: EmergencyShutdown/Release/EmergencyShutdown.exe
          - platform: x64
            artifact_path: EmergencyShutdown/x64/Release/EmergencyShutdown.exe
          - platform: ARM64
            artifact_path: EmergencyShutdown/ARM64/Release/EmergencyShutdown.exe

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild EmergencyShutdown.sln /p:Configuration=Release /p:Platform=${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EmergencyShutdown-${{ matrix.platform }}
          path: ${{ matrix.artifact_path }}
